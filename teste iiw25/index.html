<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Inteligente - Herança</title>
    <link rel="stylesheet" href="CSS e estilos/style.css">
</head>
<body>

    <div class="container">
        <!-- SEÇÃO JATO EXECUTIVO -->
        <div class="card" id="painel-jato">
            <h2>🛩️ Jato Executivo</h2>
            <p>Status: <span id="jato-status">No Pátio</span></p>
            <p>Altitude: <span id="jato-altitude">0</span>m</p>
            <p>Supersônico: <span id="jato-super">Desativado</span></p>
            
            <button onclick="meuJato.decolar()">Decolar</button>
            <button onclick="meuJato.ativarSupersonico()">Ativar Supersônico</button>
            <button onclick="meuJato.desativarSupersonico()">Desativar Supersônico</button>
        </div>

        <!-- SEÇÃO VOO DE CARGA -->
        <div class="card" id="painel-carga">
            <h2>📦 Voo de Carga</h2>
            <p>Carga: <span id="carga-atual">0</span> / <span id="carga-max">0</span> kg</p>
            <p>Altitude: <span id="carga-altitude">0</span>m</p>
            
            <input type="number" id="input-peso" placeholder="Peso em kg">
            <button onclick="carregarAviao()">Embarcar Carga</button>
            <button onclick="meuCargueiro.decolar()">Decolar</button>
        </div>
    </div>

    <script src="Js/script.js"></script>
</body>
</html>
